<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>اتمتها — مدرب المبيعات</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;
  --accent:#6c63ff;--accent2:#00d4aa;--danger:#ff4d6d;--warn:#ffa94d;
  --text:#e8eaf6;--text2:#9098c0;--green:#40c97f;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Noto Sans Arabic',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* SETUP */
#setup-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:28px;}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 36px;width:100%;max-width:540px;display:flex;flex-direction:column;gap:22px;}
.setup-card h2{font-size:1.4rem;color:var(--accent2);text-align:center;}
.setup-card p{font-size:0.85rem;color:var(--text2);text-align:center;line-height:1.7;}
.field{display:flex;flex-direction:column;gap:8px;}
.field label{font-size:0.85rem;color:var(--text2);}
.difficulty-row{display:flex;gap:10px;}
.diff-btn{flex:1;padding:11px;border-radius:10px;font-size:0.88rem;font-weight:600;border:2px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s;}
.diff-btn.selected{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.1);}
.profile-card{border:2px solid var(--border);border-radius:12px;padding:13px 15px;cursor:pointer;background:var(--surface2);transition:all .2s;display:flex;flex-direction:column;gap:4px;}
.profile-card:hover{border-color:var(--accent);}
.profile-card.selected{border-color:var(--accent2);background:rgba(0,212,170,.07);}
.profile-card .pname{font-weight:700;font-size:0.92rem;}
.profile-card .pbio{font-size:0.79rem;color:var(--text2);line-height:1.5;}
.profile-card .ppain{font-size:0.78rem;color:var(--warn);margin-top:2px;}
button.primary{font-family:inherit;border-radius:8px;border:none;background:var(--accent);color:#fff;padding:13px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%;}
button.primary:hover{background:#5a52e0;}
.section-divider{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:0.75rem;letter-spacing:1.2px;}
.section-divider::before,.section-divider::after{content:"";flex:1;height:1px;background:var(--border);}
.form-input{font-family:inherit;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 13px;font-size:0.88rem;width:100%;outline:none;transition:border-color .2s;direction:rtl;}
.form-input:focus{border-color:var(--accent);}
select.form-input{cursor:pointer;}
.real-client-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);transition:all .2s;}
.real-client-toggle:hover{border-color:var(--accent);}
.toggle-switch{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;flex-shrink:0;transition:background .2s;}
.toggle-switch.on{background:var(--accent2);}
.toggle-switch::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;}
.toggle-switch.on::after{left:19px;}
.toggle-label{font-size:0.85rem;flex:1;}
.toggle-sub{font-size:0.75rem;color:var(--text2);}
#real-client-fields{display:none;flex-direction:column;gap:12px;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;}
.badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:0.75rem;border:1px solid var(--border);color:var(--text2);}
.badge.highlight{border-color:var(--accent2);color:var(--accent2);background:rgba(0,212,170,.07);}
.badge.warn{border-color:var(--warn);color:var(--warn);background:rgba(255,169,77,.07);}

/* MAIN */
#main-screen{flex:1;display:none;flex-direction:column;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap;}
.logo{font-size:1.1rem;font-weight:700;color:var(--accent);}
.logo span{color:var(--accent2);}
.phase-indicator{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.phase-pip{width:28px;height:5px;border-radius:3px;background:var(--border);transition:all .3s;}
.phase-pip.done{background:var(--green);}
.phase-pip.active{background:var(--accent2);box-shadow:0 0 6px var(--accent2);}
.phase-name-badge{font-size:0.78rem;font-weight:700;color:var(--accent2);background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);padding:3px 10px;border-radius:20px;}
.top-right{display:flex;gap:8px;align-items:center;}
button.small{font-family:inherit;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:7px 13px;font-size:0.82rem;cursor:pointer;transition:all .2s;}
button.small:hover{border-color:var(--accent);}
button.small.danger{background:var(--danger);border-color:var(--danger);color:#fff;}

/* 3-COL */
.columns{flex:1;display:grid;grid-template-columns:280px 1fr 300px;overflow:hidden;}
@media(max-width:1000px){.columns{grid-template-columns:240px 1fr 260px;}}
@media(max-width:700px){.columns{grid-template-columns:1fr;}.script-panel,.coach-panel{border-top:1px solid var(--border);max-height:220px;}}

/* SCRIPT PANEL */
.script-panel{border-left:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:var(--surface);}
.panel-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);padding-bottom:7px;border-bottom:1px solid var(--border);margin-bottom:2px;}
.phase-block{border-radius:10px;border:1px solid var(--border);background:var(--surface2);overflow:hidden;transition:all .3s;}
.phase-block.active{border-color:var(--accent2);background:rgba(0,212,170,.05);}
.phase-block.done{border-color:rgba(64,201,127,.35);background:rgba(64,201,127,.04);}
.phase-header{padding:9px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.phase-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--border);transition:all .3s;}
.phase-block.active .phase-dot{background:var(--accent2);box-shadow:0 0 5px var(--accent2);}
.phase-block.done .phase-dot{background:var(--green);}
.phase-label{font-size:0.78rem;font-weight:700;color:var(--text2);transition:color .3s;}
.phase-block.active .phase-label{color:var(--accent2);}
.phase-block.done .phase-label{color:var(--green);}
.phase-lines{padding:0 13px 11px;display:none;flex-direction:column;gap:7px;}
.phase-block.active .phase-lines{display:flex;}
.script-line{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:8px;padding:8px 11px;font-size:0.82rem;line-height:1.6;color:var(--text);direction:ltr;text-align:left;cursor:pointer;transition:all .15s;position:relative;}
.script-line:hover{background:rgba(108,99,255,.18);border-color:var(--accent);}
.script-line.hit{background:rgba(64,201,127,.15);border-color:var(--green)!important;color:#fff;}
.script-line.missed{background:rgba(255,77,109,.08);border-color:rgba(255,77,109,.3);}
.line-tag{font-size:0.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
.line-check{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:0.85rem;}
.copy-hint{font-size:0.68rem;color:var(--text2);text-align:center;padding:2px 0 4px;}

/* CHAT */
.chat-col{display:flex;flex-direction:column;overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
.message{display:flex;gap:9px;align-items:flex-start;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.message.prospect{flex-direction:row-reverse;}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;}
.avatar.rep{background:rgba(0,212,170,.2);color:var(--accent2);border:1px solid rgba(0,212,170,.4);}
.avatar.prospect{background:rgba(108,99,255,.2);color:var(--accent);border:1px solid rgba(108,99,255,.4);}
.bubble{max-width:76%;padding:12px 15px;border-radius:14px;line-height:1.65;font-size:0.93rem;}
.bubble.rep{background:rgba(0,212,170,.09);border:1px solid rgba(0,212,170,.22);border-top-left-radius:4px;}
.bubble.prospect{background:rgba(108,99,255,.11);border:1px solid rgba(108,99,255,.28);border-top-right-radius:4px;text-align:right;direction:rtl;}
.bubble-label{font-size:0.72rem;color:var(--text2);margin-bottom:4px;}
.eval-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 15px;font-size:0.82rem;line-height:1.65;direction:rtl;text-align:right;animation:fadeIn .3s ease;}
.eval-bubble .ev-hit{color:var(--green);}
.eval-bubble .ev-miss{color:var(--warn);}
.eval-bubble .ev-score{font-size:1rem;font-weight:700;}

/* MIC */
.mic-area{padding:14px 18px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.transcript-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;min-height:54px;font-size:0.92rem;line-height:1.6;color:var(--text);direction:ltr;text-align:left;transition:border-color .2s;outline:none;}
.transcript-box.listening{border-color:var(--danger);}
.transcript-box.has-text{border-color:var(--accent2);}
.transcript-placeholder{color:var(--text2);font-style:italic;}
.mic-controls{display:flex;gap:9px;align-items:center;}
#mic-btn{width:50px;height:50px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;transition:all .2s;padding:0;cursor:pointer;}
#mic-btn.recording{background:rgba(255,77,109,.2);border-color:var(--danger);color:var(--danger);animation:micPulse 1.2s infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,.4)}50%{box-shadow:0 0 0 11px rgba(255,77,109,0)}}
#send-btn-main{flex:1;font-family:inherit;border-radius:8px;border:none;background:var(--accent);color:#fff;padding:13px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all .2s;}
#send-btn-main:hover{background:#5a52e0;}
#send-btn-main:disabled{opacity:.4;cursor:not-allowed;}
#clear-btn{font-family:inherit;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);padding:13px 14px;cursor:pointer;font-size:0.9rem;}

/* COACH */
.coach-panel{border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;background:var(--surface);}
.prospect-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:9px;}
.pc-row{display:flex;flex-direction:column;gap:2px;}
.pc-label{font-size:0.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;}
.pc-val{font-size:0.83rem;line-height:1.5;}
.pc-val.warn{color:var(--warn);}
.pc-val.good{color:var(--green);}
.score-summary{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.score-row{display:flex;align-items:center;gap:10px;}
.score-label{font-size:0.78rem;color:var(--text2);min-width:90px;}
.bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.score-num{font-size:0.82rem;font-weight:700;min-width:26px;text-align:left;}

/* DEBRIEF */
#debrief-screen{display:none;flex:1;overflow-y:auto;padding:28px 20px;flex-direction:column;align-items:center;gap:24px;}
.debrief-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px 30px;width:100%;max-width:660px;display:flex;flex-direction:column;gap:18px;}
.debrief-card h2{font-size:1.25rem;color:var(--accent2);text-align:center;}
.big-score{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.3);border-radius:12px;padding:18px;text-align:center;}
.big-score .num{font-size:3.2rem;font-weight:700;color:var(--accent);}
.big-score .lbl{font-size:0.85rem;color:var(--text2);}
.debrief-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.dg-item{background:var(--surface2);border-radius:10px;padding:13px;display:flex;flex-direction:column;gap:6px;}
.dg-item .lbl{font-size:0.78rem;color:var(--text2);}
.dg-item .val{font-size:1.8rem;font-weight:700;}
.verdict-box{background:var(--surface2);border-radius:10px;padding:14px;font-size:0.9rem;line-height:1.7;}
.verdict-box strong{color:var(--accent2);}
.top-fix{background:rgba(255,169,77,.1);border:1px solid rgba(255,169,77,.3);border-radius:10px;padding:13px;font-size:0.88rem;line-height:1.65;}
.top-fix strong{color:var(--warn);}
.phase-report{display:flex;flex-direction:column;gap:8px;}
.pr-row{display:flex;align-items:center;gap:10px;font-size:0.82rem;}
.pr-row .pr-label{min-width:140px;color:var(--text2);}
.pr-row .pr-status{font-weight:600;}
.pr-row .pr-status.ok{color:var(--green);}
.pr-row .pr-status.nok{color:var(--danger);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>اتمتها — مدرب المبيعات</h2>
    <p>اختر نوع العميل — كل بروفايل مبني على إجابات Calendly الفعلية</p>
    <div class="field">
      <label>اختر العميل</label>
      <div id="profile-cards" style="display:flex;flex-direction:column;gap:9px;"></div>
    </div>
    <div class="field">
      <label>مستوى الصعوبة</label>
      <div class="difficulty-row">
        <button class="diff-btn selected" data-diff="easy">سهل</button>
        <button class="diff-btn" data-diff="mid">متوسط</button>
        <button class="diff-btn" data-diff="hard">صعب</button>
      </div>
    </div>
    <button class="primary" id="start-btn">ابدأ الجلسة</button>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="main-screen">
  <div class="top-bar">
    <span class="logo">اتمتها <span>●</span></span>
    <div class="phase-indicator" id="phase-indicator"></div>
    <span class="phase-name-badge" id="phase-name-badge">المقدمة</span>
    <div class="top-right">
      <button class="small" id="tts-btn">🔊</button>
      <button class="small danger" id="end-btn">انهاء الجلسة</button>
    </div>
  </div>
  <div class="columns">

    <!-- SCRIPT -->
    <div class="script-panel">
      <div class="panel-title">السكريبت</div>
      <div class="copy-hint">اضغط أي جملة لنسخها ✦ تتحول خضراء لما تقولها</div>
      <div id="phase-blocks"></div>
    </div>

    <!-- CHAT -->
    <div class="chat-col">
      <div class="messages" id="messages"></div>
      <div class="mic-area">
        <div class="transcript-box" id="transcript-box" contenteditable="true">
          <span class="transcript-placeholder" id="ph">اضغط المايك وتكلم، أو اكتب هنا...</span>
        </div>
        <div class="mic-controls">
          <button id="mic-btn">🎙️</button>
          <button id="send-btn-main" disabled>إرسال ← Enter</button>
          <button id="clear-btn">🗑️</button>
        </div>
      </div>
    </div>

    <!-- COACH -->
    <div class="coach-panel">
      <div class="panel-title">ملف العميل</div>
      <div id="prospect-card"></div>
      <div class="panel-title" style="margin-top:4px;">النتيجة الحالية</div>
      <div class="score-summary" id="score-summary">
        <div class="score-row"><span class="score-label">المقدمة</span><div class="bar-bg"><div class="bar-fill" id="sc-opening" style="width:0%;background:var(--text2)"></div></div><span class="score-num" id="sn-opening">—</span></div>
        <div class="score-row"><span class="score-label">الاستكشاف</span><div class="bar-bg"><div class="bar-fill" id="sc-discovery" style="width:0%;background:var(--text2)"></div></div><span class="score-num" id="sn-discovery">—</span></div>
        <div class="score-row"><span class="score-label">العرض</span><div class="bar-bg"><div class="bar-fill" id="sc-pitch" style="width:0%;background:var(--text2)"></div></div><span class="score-num" id="sn-pitch">—</span></div>
        <div class="score-row"><span class="score-label">الإغلاق</span><div class="bar-bg"><div class="bar-fill" id="sc-closing" style="width:0%;background:var(--text2)"></div></div><span class="score-num" id="sn-closing">—</span></div>
        <div class="score-row"><span class="score-label">الاعتراضات</span><div class="bar-bg"><div class="bar-fill" id="sc-objections" style="width:0%;background:var(--text2)"></div></div><span class="score-num" id="sn-objections">—</span></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ DEBRIEF ══ -->
<div id="debrief-screen">
  <div class="debrief-card">
    <h2>ملخص الجلسة</h2>
    <div id="debrief-content"></div>
    <button class="primary" onclick="resetApp()">جلسة جديدة</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  PROSPECT PROFILES
// ═══════════════════════════════════════════════════
// ─── Profile schema ───
// name, role, tags[], pain, goal, budget, aiLevel
// tags shown as badges in the selector card
// replies/hard_replies: scripted prospect lines per phase bucket

const PROFILES = [

  // ══ 1. مبتدئ — صاحب عمل — ميزانية متوسطة ══
  {
    name: "خالد العتيبي",
    role: "صاحب شركة مقاولات صغيرة — الرياض",
    tags: ["صاحب عمل", "مبتدئ مع الذكاء", "ميزانية ٤٠٠٠–٩٩٩٩"],
    pain: "يضيّع وقته في متابعة الموظفين والتقارير يدوياً",
    goal: "يوفر ٣ ساعات يومياً ويركز على تطوير العمل",
    aiLevel: "مبتدئ",
    budget: "4000-9999",
    replies: {
      opening:        ["أيوه هلا، يسعدك.", "أهلاً، حاضر."],
      discovery:      ["صراحة تعبت من الروتين اليومي وحسيت إن لازم أغير شيء.", "شفت محتواك عن الأتمتة وحسيت إنها تناسب وضعي."],
      pain_deep:      ["ما أعرف أبدأ من وين، كثير أدوات وما أعرف وش يناسبني.", "جربت ChatGPT بس ما بنيت شيء عملي فعلاً."],
      desire:         ["أبي يشتغل الشغل بدوني، أوفر ٣ ساعات يومياً على الأقل.", "أبي أوقف التقارير اليدوية وأركز على تطوير الشغل."],
      cost:           ["لو كملت كذا، بكمل أنا اللي يشتغل مكان الشغل مو العكس.", "كل أسبوع أضيع وقت في شغل المفروض يتم لوحده."],
      transition:     ["زين، كيف البرنامج يساعدني بالضبط؟", "اشرح لي وش بتعلمني."],
      pitch:          ["الجزء العملي هو اللي يهمني — أبي أبني شيء حقيقي.", "المجتمع يبدو مهم، كم عدد الناس فيه؟"],
      commitment:     ["٧ من ١٠، أبي أتأكد إن الوقت المطلوب مناسب لجدولي.", "قريب جداً، بس السعر محتاج أفكر فيه."],
      investment:     ["وش السعر؟", "٧٥٠٠ ريال. ما رخيص، بس أفهم ليش.", "ما عندكم تقسيط؟"],
      objection_price:["لو كانت على دفعتين تمام.", "أبي أتأكد إنها تستاهل أول."],
      objection_think:["خليني أفكر يومين.", "أبي أشاور مرتي."],
      close:          ["زين، كيف أبدأ؟", "تمام، خلاص أنا معك."],
    },
    hard_replies: {

async function callStepfun(messages) {
  const res = await fetch('https://api.stepfun.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${STEPFUN_API_KEY}`,
    },
    body: JSON.stringify({
      model: 'step-1-flash',
      messages,
      max_tokens: 120,
      temperature: 0.85,
    }),
  });
  if (!res.ok) throw new Error(await res.text());
  const d = await res.json();
  return d.choices[0].message.content.trim();
}

async function getAIProspectReply(repText) {

function getScriptedFallback(phaseId) {

// ═══════════════════════════════════════════════════
//  KEYWORD DETECTION
// ═══════════════════════════════════════════════════
function normalize(t){ return t.toLowerCase().replace(/[أإآا]/g,"ا").replace(/[ةه]/g,"ه").replace(/ى/g,"ي").replace(/[^؀-ۿa-z0-9 ]/g," "); }

function detectHits(repText, phase){
  const t = normalize(repText);
  const hits = [];
  phase.lines.forEach((line, idx) => {
    const kws = normalize(line.text).split(/\s+/).filter(w => w.length > 3);
    const matchCount = kws.filter(w => t.includes(w)).length;
    if(matchCount >= 2) hits.push(idx);
  });
  return hits;
}

function scorePhrase(repText, phase){
  const t = normalize(repText);
  const phaseKws = phase.keywords.map(normalize);
  const matched = phaseKws.filter(k => t.includes(normalize(k))).length;
  return Math.round((matched / Math.max(phaseKws.length, 1)) * 100);
}

function detectPhaseFromText(repText){
  const t = normalize(repText);
  let best = null, bestScore = 0;
  PHASES.forEach(p => {
    const s = scorePhrase(repText, p);
    if(s > bestScore){ bestScore = s; best = p.id; }
  });
  return bestScore >= 20 ? best : null;
}

// ═══════════════════════════════════════════════════
//  PROSPECT REPLY ENGINE (no AI — scripted)
// ═══════════════════════════════════════════════════
function getProspectReply(repText, phaseId){
  const profile = PROFILES[S.profileIdx];
  const t = normalize(repText);
  const isHard = S.difficulty === "hard";
  const replies = isHard ? profile.hard_replies : profile.replies;

  // map phase → reply bucket
  const bucketMap = {
    opening:               "opening",
    discovery_motivation:  "discovery",
    discovery_situation:   "discovery",
    discovery_pain:        "pain_deep",
    discovery_desire:      "desire",
    discovery_cost:        "cost",
    transition:            "transition",
    pitch:                 "pitch",
    commitment:            "commitment",
    investment:            "investment",
    objections:            "objection_price",
  };

  // detect if rep is handling a price objection
  if(t.includes("فلوس") || t.includes("سعر") || t.includes("تقسيط") || t.includes("دفع")) {
    const bucket = replies["objection_price"] || replies["investment"];
    return bucket[Math.floor(Math.random() * bucket.length)];
  }
  if(t.includes("أفكر") || t.includes("وقت") || t.includes("رجع")) {
    const bucket = replies["objection_think"] || replies["transition"];
    return bucket[Math.floor(Math.random() * bucket.length)];
  }
  if(t.includes("تمام") || t.includes("أبدأ") || t.includes("نكمل")) {
    const bucket = replies["close"] || replies["transition"];
    return bucket[Math.floor(Math.random() * bucket.length)];
  }

  const bucket = replies[bucketMap[phaseId]] || replies["transition"];
  return bucket[Math.floor(Math.random() * bucket.length)];
}

// ═══════════════════════════════════════════════════
//  EVAL LOGIC — accumulates per phase, not per send
// ═══════════════════════════════════════════════════

// Buffer: all rep text sent in this phase so far
// Resets when phase changes
let S_phaseBuffer = "";
let S_lastEvalPhase = "";

function evalRepMessage(repText){
  const phase = PHASES[S.phaseIdx];

  // accumulate text for this phase
  if(S_lastEvalPhase !== phase.id){
    S_phaseBuffer = "";
    S_lastEvalPhase = phase.id;
  }
  S_phaseBuffer += " " + repText;

  // score against accumulated buffer
  const score = scorePhrase(S_phaseBuffer, phase);
  const hits = detectHits(S_phaseBuffer, phase);

  // mark hit lines
  hits.forEach(idx => S.hitLines.add(`${phase.id}-${idx}`));

  // only count score once per phase (update, don't average again)
  const key = phase.scoreKey;
  if(S.scoreCounts[key] === 0){
    S.scores[key] = score;
    S.scoreCounts[key] = 1;
  } else {
    S.scores[key] = score; // replace with latest accumulated score
  }

  // what worked / missed based on accumulated buffer
  const hitLabels = hits.map(i => phase.lines[i].tag);
  const allHit = hits.length >= phase.lines.length;
  const missedLabels = phase.lines.filter((_, i) => !hits.includes(i)).map(l => l.tag);

  // decide if prospect should reply this turn
  // Prospect replies when: score >= 30 OR this is a question (ends with ?) OR 2+ sends in same phase
  const isQuestion = repText.trim().endsWith("?") || repText.trim().endsWith("؟");
  const sendsInPhase = S_phaseBuffer.trim().split(/[.!؟?]/).filter(s => s.trim().length > 3).length;
  const prospectShouldReply = score >= 30 || isQuestion || sendsInPhase >= 2;

  // auto advance phase?
  const detectedPhase = detectPhaseFromText(S_phaseBuffer);
  let advanced = false;
  if(detectedPhase && PHASE_ORDER.indexOf(detectedPhase) > S.phaseIdx){
    S.donePhases.add(phase.id);
    S.phaseIdx = PHASE_ORDER.indexOf(detectedPhase);
    S_phaseBuffer = "";
    advanced = true;
  } else if(score >= 50 && S.phaseIdx < PHASES.length - 1){
    S.donePhases.add(phase.id);
    S.phaseIdx = Math.min(S.phaseIdx + 1, PHASES.length - 1);
    S_phaseBuffer = "";
    advanced = true;
  }

  return { score, hitLabels, missedLabels, advanced, newPhase: PHASES[S.phaseIdx], prospectShouldReply };
}

function buildScriptPanel(){
  const container = document.getElementById("phase-blocks");
  container.innerHTML = "";
  PHASES.forEach((phase, pIdx) => {
    const isActive = pIdx === S.phaseIdx;
    const isDone = S.donePhases.has(phase.id);
    const block = document.createElement("div");
    block.className = "phase-block" + (isActive ? " active" : "") + (isDone ? " done" : "");
    block.id = "pb-" + phase.id;

    const header = document.createElement("div");
    header.className = "phase-header";
    header.innerHTML = `<div class="phase-dot"></div><div class="phase-label">${phase.label}</div>`;
    header.onclick = () => { S.phaseIdx = pIdx; refreshScriptPanel(); };

    const linesDiv = document.createElement("div");
    linesDiv.className = "phase-lines";
    phase.lines.forEach((line, lIdx) => {
      const key = `${phase.id}-${lIdx}`;
      const isHit = S.hitLines.has(key);
      const el = document.createElement("div");
      el.className = "script-line" + (isHit ? " hit" : "");
      el.id = "sl-" + key;
      el.innerHTML = `<div class="line-tag">${line.tag}</div>${line.text}${isHit ? '<span class="line-check">✓</span>' : ''}`;
      el.onclick = () => {
        navigator.clipboard?.writeText(line.text).catch(()=>{});
        el.style.opacity = "0.6";
        setTimeout(() => el.style.opacity = "1", 300);
      };
      linesDiv.appendChild(el);
    });

    block.appendChild(header);
    block.appendChild(linesDiv);
    container.appendChild(block);
  });

  // build pips
  const pip = document.getElementById("phase-indicator");
  pip.innerHTML = "";
  PHASES.forEach((p, i) => {
    const d = document.createElement("div");
    d.className = "phase-pip" + (i === S.phaseIdx ? " active" : "") + (S.donePhases.has(p.id) ? " done" : "");
    pip.appendChild(d);
  });

  document.getElementById("phase-name-badge").textContent = PHASES[S.phaseIdx].label;
}

function refreshScriptPanel(){
  PHASES.forEach((phase, pIdx) => {
    const block = document.getElementById("pb-" + phase.id);
    if(!block) return;
    block.className = "phase-block" + (pIdx === S.phaseIdx ? " active" : "") + (S.donePhases.has(phase.id) ? " done" : "");
    phase.lines.forEach((_, lIdx) => {
      const el = document.getElementById("sl-" + phase.id + "-" + lIdx);
      if(!el) return;
      const isHit = S.hitLines.has(`${phase.id}-${lIdx}`);
      el.className = "script-line" + (isHit ? " hit" : "");
      if(isHit && !el.querySelector(".line-check")){
        el.insertAdjacentHTML("beforeend", '<span class="line-check">✓</span>');
      }
    });
  });
  // pips
  document.querySelectorAll(".phase-pip").forEach((pip, i) => {
    pip.className = "phase-pip" + (i === S.phaseIdx ? " active" : "") + (S.donePhases.has(PHASES[i].id) ? " done" : "");
  });
  document.getElementById("phase-name-badge").textContent = PHASES[S.phaseIdx].label;
  // scroll active into view
  const active = document.getElementById("pb-" + PHASES[S.phaseIdx].id);
  if(active) active.scrollIntoView({behavior:"smooth", block:"nearest"});
}

  const c = document.getElementById("messages");
  const d = document.createElement("div");
  d.className = "message prospect"; d.id = id;
  d.innerHTML = `<div class="avatar prospect">ع</div>
    <div class="bubble prospect" style="padding:12px 18px;letter-spacing:3px;color:var(--text2)">●●●</div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
  return id;
}
function removeTyping(id){
  const el = document.getElementById(id);
  if(el) el.remove();
}

function addMsg(role, text){
  const c = document.getElementById("messages");
  const d = document.createElement("div");
  d.className = "message " + role;
  d.innerHTML = `<div class="avatar ${role}">${role==="rep"?"أ":"ع"}</div>
    <div class="bubble ${role}">
      <div class="bubble-label">${role==="rep"?"أنت":"العميل"}</div>${text}
    </div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addEval(evalResult){
  const c = document.getElementById("messages");
  const d = document.createElement("div");
  d.className = "eval-bubble";
  const hitHtml = evalResult.hitLabels.length
    ? `<span class="ev-hit">✓ قلت: ${evalResult.hitLabels.join("، ")}</span>`
    : `<span class="ev-miss">✗ ما غطيت أي نقطة من المرحلة</span>`;
  const missHtml = evalResult.missedLabels.length
    ? `<br><span class="ev-miss">△ فاتك: ${evalResult.missedLabels.join("، ")}</span>` : "";
  const adv = evalResult.advanced ? `<br><span style="color:var(--accent2)">← انتقلنا لـ ${evalResult.newPhase.label}</span>` : "";
  d.innerHTML = `<span class="ev-score">${evalResult.score}/100</span> — ${hitHtml}${missHtml}${adv}`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

// ═══════════════════════════════════════════════════
//  TTS
// ═══════════════════════════════════════════════════
let ttsEnabled = true;
function speak(text){
  if(!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ar-SA"; u.rate = 0.95;
  const v = window.speechSynthesis.getVoices().find(x => x.lang.startsWith("ar"));
  if(v) u.voice = v;
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════
//  SPEECH RECOGNITION
// ═══════════════════════════════════════════════════
let recog = null, isRec = false, finalT = "";

function setupRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ document.getElementById("mic-btn").disabled = true; return; }
  recog = new SR();
  recog.continuous = true; recog.interimResults = true; recog.lang = "ar-SA";
  recog.onresult = e => {
    let interim = "";
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalT += t + " ";
      else interim += t;
    }
    const box = document.getElementById("transcript-box");
    const display = (finalT + interim).trim();
    document.getElementById("ph").style.display = display ? "none" : "";
    // set text node
    const existing = [...box.childNodes].find(n => n.nodeType === 3);
    if(existing) existing.textContent = display;
    else box.insertBefore(document.createTextNode(display), document.getElementById("ph"));
    box.className = "transcript-box has-text";
    document.getElementById("send-btn-main").disabled = !display;
  };
  recog.onerror = e => { if(e.error !== "no-speech") stopRec(); };
  recog.onend = () => { if(isRec) recog.start(); };
}

function startRec(){
  if(!recog) return;
  finalT = "";
  const box = document.getElementById("transcript-box");
  box.innerHTML = '<span class="transcript-placeholder" id="ph">تسجيل...</span>';
  box.className = "transcript-box listening";
  document.getElementById("send-btn-main").disabled = true;
  isRec = true;
  document.getElementById("mic-btn").className = "recording";
  document.getElementById("mic-btn").textContent = "⏹";
  recog.start();
}

function stopRec(){
  isRec = false;
  try{ recog?.stop(); } catch(e){}
  document.getElementById("mic-btn").className = "";
  document.getElementById("mic-btn").textContent = "🎙️";
  const box = document.getElementById("transcript-box");
  const text = finalT.trim();
  if(text){ box.className = "transcript-box has-text"; document.getElementById("send-btn-main").disabled = false; }
  else { clearInput(); }
}

function getInput(){
  const box = document.getElementById("transcript-box");
  return box.innerText.replace("اضغط المايك وتكلم، أو اكتب هنا...","").replace("تسجيل...","").trim();
}

function clearInput(){
  finalT = "";
  const box = document.getElementById("transcript-box");
  box.className = "transcript-box";
  box.innerHTML = '<span class="transcript-placeholder" id="ph">اضغط المايك وتكلم، أو اكتب هنا...</span>';
  document.getElementById("send-btn-main").disabled = true;
}

// ═══════════════════════════════════════════════════
//  SEND
// ═══════════════════════════════════════════════════
function sendMessage(){
  if(S.sessionOver) return;
  const text = getInput();
  if(!text) return;
  if(isRec) stopRec();

  addMsg("rep", text);
  clearInput();
  S.turn++;

  const evalResult = evalRepMessage(text);
  refreshScriptPanel();
  updateScoreBars();

  // show typing indicator
  const typingId = showTyping();

  // prospect replies via AI
  getAIProspectReply(text).then(reply => {
    removeTyping(typingId);
    addMsg("prospect", reply);
    speak(reply);
    if(evalResult.advanced || evalResult.score >= 30){
      addEval(evalResult);
    }
  });
}

// ═══════════════════════════════════════════════════
//  DEBRIEF
// ═══════════════════════════════════════════════════
function showDebrief(){
  S.sessionOver = true;
  document.getElementById("main-screen").style.display = "none";
  document.getElementById("debrief-screen").style.display = "flex";

  const overall = Math.round(Object.values(S.scores).reduce((a,b)=>a+b,0) / 5);
  const phaseReport = PHASES.map(p => ({
    label: p.label,
    done: S.donePhases.has(p.id),
    score: S.scores[p.scoreKey] || 0,
  }));

  // top fix
  const weakest = Object.entries(S.scores).sort((a,b)=>a[1]-b[1])[0];
  const fixMap = {
    opening: "ركز على تأطير المكالمة بشكل واضح قبل ما تبدأ الأسئلة",
    discovery: "اسأل أسئلة أعمق عن الألم والهدف، ما تكتفي بسؤال واحد",
    pitch: "اذكر الأعمدة الثلاثة كلها واسأل 'ايش يلفت انتباهك؟'",
    closing: "استخدم مقياس 1-10 ثم اصمت بعد ما تقدم السعر",
    objections: "اعزل الاعتراض أولاً قبل ما تعالجه، واستخدم الضمان آخر ورقة",
  };

  const coverageHtml = phaseReport.map(p =>
    `<div class="pr-row"><span class="pr-label">${p.label}</span><span class="pr-status ${p.done?"ok":"nok"}">${p.done?"✓ غطّيتها":"✗ ما غطّيتها"}</span></div>`
  ).join("");

  document.getElementById("debrief-content").innerHTML = `
    <div class="big-score"><div class="num">${overall}</div><div class="lbl">النتيجة الإجمالية / 100</div></div>
    <div class="debrief-grid">
      <div class="dg-item"><div class="lbl">الاستكشاف</div><div class="val" style="color:${scColor(S.scores.discovery)}">${S.scores.discovery}</div></div>
      <div class="dg-item"><div class="lbl">العرض</div><div class="val" style="color:${scColor(S.scores.pitch)}">${S.scores.pitch}</div></div>
      <div class="dg-item"><div class="lbl">الإغلاق</div><div class="val" style="color:${scColor(S.scores.closing)}">${S.scores.closing}</div></div>
      <div class="dg-item"><div class="lbl">الاعتراضات</div><div class="val" style="color:${scColor(S.scores.objections)}">${S.scores.objections}</div></div>
    </div>
    <div class="top-fix"><strong>الأهم لتحسينه:</strong><br>${fixMap[weakest[0]] || "راجع السكريبت كاملًا"}</div>
    <div class="verdict-box"><strong>تغطية المراحل:</strong><br><br><div class="phase-report">${coverageHtml}</div></div>`;
}

function scColor(n){ return n>=70?"var(--green)":n>=40?"var(--warn)":"var(--danger)"; }

// ═══════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════
function resetApp(){
  S.phaseIdx=0; S.turn=0; S.sessionOver=false;
  S.scores={opening:0,discovery:0,pitch:0,closing:0,objections:0};
  S.scoreCounts={opening:0,discovery:0,pitch:0,closing:0,objections:0};
  S.hitLines=new Set(); S.donePhases=new Set();
  S_phaseBuffer=""; S_lastEvalPhase="";
  conversationHistory = [];
  document.getElementById("messages").innerHTML="";
  clearInput();
  document.getElementById("end-btn").disabled=false;
  document.getElementById("debrief-screen").style.display="none";
  document.getElementById("setup-screen").style.display="flex";
  document.getElementById("main-screen").style.display="none";
  window.speechSynthesis.cancel();
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
function startSession(){
  conversationHistory = [];
  S_phaseBuffer=""; S_lastEvalPhase="";
  document.getElementById("setup-screen").style.display="none";
  const main = document.getElementById("main-screen");
  main.style.display="flex"; main.style.flexDirection="column";

  const profile = PROFILES[S.profileIdx];

  const budgetColor = profile.budget === "20000+" ? "color:var(--green)" :
                      profile.budget === "4000-9999" ? "color:var(--warn)" : "color:var(--accent2)";
  const tagsHtml = profile.tags.map(t => `<span class="badge highlight">${t}</span>`).join(" ");

  document.getElementById("prospect-card").innerHTML = `
    <div class="prospect-card">
      <div class="pc-row"><div class="pc-label">الاسم</div><div class="pc-val" style="font-weight:700">${profile.name}</div></div>
      <div class="pc-row"><div class="pc-label">الدور</div><div class="pc-val">${profile.role}</div></div>
      <div class="pc-row"><div class="pc-label"></div><div class="badge-row" style="margin-top:2px">${tagsHtml}</div></div>
      <div class="pc-row"><div class="pc-label">ألمه</div><div class="pc-val warn" style="font-size:0.8rem">⚡ ${profile.pain}</div></div>
      <div class="pc-row"><div class="pc-label">هدفه</div><div class="pc-val good" style="font-size:0.8rem">◎ ${profile.goal}</div></div>
      <div class="pc-row"><div class="pc-label">الميزانية</div><div class="pc-val" style="${budgetColor};font-weight:700">${profile.budget} ريال</div></div>
    </div>`;

  buildScriptPanel();
  updateScoreBars();

  const opening = profile.replies.opening[0];
  setTimeout(() => { addMsg("prospect", opening); speak(opening); }, 300);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  setupRec();

  // profile cards
  PROFILES.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "profile-card" + (i===0?" selected":"");
    const tagsHtml = p.tags.map(t => `<span class="badge">${t}</span>`).join(" ");
    card.innerHTML = `<div class="pname">${p.name}</div><div class="pbio">${p.role}</div><div class="badge-row" style="margin-top:5px">${tagsHtml}</div>`;
    card.onclick = () => {
      document.querySelectorAll(".profile-card").forEach(c=>c.classList.remove("selected"));
      card.classList.add("selected");
      S.profileIdx = i;
    };
    document.getElementById("profile-cards").appendChild(card);
  });

  // difficulty
  document.querySelectorAll(".diff-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      S.difficulty = btn.dataset.diff;
    };
  });

  document.getElementById("start-btn").onclick = startSession;
  document.getElementById("mic-btn").onclick = () => isRec ? stopRec() : startRec();
  document.getElementById("send-btn-main").onclick = sendMessage;
  document.getElementById("clear-btn").onclick = () => { if(isRec) stopRec(); clearInput(); };
  document.getElementById("end-btn").onclick = showDebrief;
  document.getElementById("tts-btn").onclick = () => {
    ttsEnabled = !ttsEnabled;
    document.getElementById("tts-btn").textContent = ttsEnabled ? "🔊" : "🔇";
    if(!ttsEnabled) window.speechSynthesis.cancel();
  };

  // transcript box typing
  const box = document.getElementById("transcript-box");
  box.addEventListener("input", () => {
    const text = box.innerText.replace("اضغط المايك وتكلم، أو اكتب هنا...","").trim();
    box.className = text ? "transcript-box has-text" : "transcript-box";
    document.getElementById("send-btn-main").disabled = !text;
    document.getElementById("ph").style.display = text ? "none" : "";
  });
  box.addEventListener("focus", () => {
    if(box.innerText.trim() === "اضغط المايك وتكلم، أو اكتب هنا...") box.innerHTML = '<span class="transcript-placeholder" id="ph"></span>';
  });

  // keyboard
  document.addEventListener("keydown", e => {
    if(document.activeElement === box) return;
    if(e.code==="Space" && !e.ctrlKey && !e.metaKey){
      e.preventDefault();
      if(document.getElementById("main-screen").style.display!=="none") isRec ? stopRec() : startRec();
    }
    if(e.code==="Enter"){
      if(document.getElementById("main-screen").style.display!=="none" && getInput()) sendMessage();
    }
  });
  box.addEventListener("keydown", e => {
    if(e.code==="Enter" && !e.shiftKey){ e.preventDefault(); if(getInput()) sendMessage(); }
  });
});
</script>
